# ============================================================
# Day 1 database stack for the 5-Day Polyglot Training
# ------------------------------------------------------------
# Start everything:   docker compose up -d
# See what's running:  docker compose ps
# Stop everything:     docker compose down
# Stop AND delete data: docker compose down -v   (careful!)
# ============================================================

services:

  # ---------- PostgreSQL (relational core) ----------
  # This image already includes the TimescaleDB and pgvector
  # extensions, so the PostgreSQL lab works without extra installs.
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: pq_postgres
    environment:
      POSTGRES_USER: trainer
      POSTGRES_PASSWORD: trainer
      POSTGRES_DB: pixelquest
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainer -d pixelquest"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis Stack (cache & data structures) ----------
  # redis-stack-server includes RediSearch and RedisJSON modules.
  redis:
    image: redis/redis-stack-server:latest
    container_name: pq_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Neo4j (graph) ----------
  # APOC and Graph Data Science (GDS) plugins are enabled.
  neo4j:
    image: neo4j:5
    container_name: pq_neo4j
    environment:
      NEO4J_AUTH: neo4j/trainer123
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
    ports:
      - "7474:7474"   # browser UI: http://localhost:7474
      - "7687:7687"   # bolt protocol (drivers / cypher-shell)
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------- Milvus dependencies: etcd + minio ----------
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: pq_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: pq_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - minio_data:/minio_data

  # ---------- Milvus (vector) standalone ----------
  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: pq_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"   # SDK / pymilvus
      - "9091:9091"     # health / metrics
    depends_on:
      - etcd
      - minio

volumes:
  pg_data:
  redis_data:
  neo4j_data:
  etcd_data:
  minio_data:
