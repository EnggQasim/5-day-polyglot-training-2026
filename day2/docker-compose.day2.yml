# ============================================================
# Day 2 streaming stack (Confluent Platform + Debezium)
# ------------------------------------------------------------
# Run ALONGSIDE the Day 1 stack (which provides PostgreSQL for CDC):
#   docker compose up -d                                   # Day 1 databases
#   docker compose -f day2/docker-compose.day2.yml up -d   # Day 2 streaming
#
# Stop Day 2:
#   docker compose -f day2/docker-compose.day2.yml down
#
# Services & ports:
#   zookeeper        2181
#   broker (kafka)   9092 (from your laptop), 29092 (inside docker)
#   schema-registry  8081
#   connect (Debezium) 8083
#   ksqldb-server    8088
# ============================================================

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: pq_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: pq_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # two listeners: one for other containers (29092), one for your laptop (9092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: pq_schema_registry
    depends_on:
      - broker
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: broker:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  # Kafka Connect with the Debezium PostgreSQL connector pre-installed.
  connect:
    image: quay.io/debezium/connect:2.7.3.Final
    container_name: pq_connect
    depends_on:
      - broker
      - schema-registry
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: broker:29092
      GROUP_ID: pq-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      # use the Confluent Avro converter + schema registry for values
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

  ksqldb-server:
    image: confluentinc/cp-ksqldb-server:7.6.1
    container_name: pq_ksqldb
    depends_on:
      - broker
      - schema-registry
    ports:
      - "8088:8088"
    environment:
      KSQL_BOOTSTRAP_SERVERS: broker:29092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KSQL_KSQL_SERVICE_ID: pq_ksql_

# This stack talks to the Day 1 PostgreSQL container (pq_postgres) over the
# default docker network using host "host.docker.internal" or the postgres
# container name if both stacks share a network. See 00-setup for details.
