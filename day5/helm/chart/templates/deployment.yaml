# Templated Deployment: the placeholders below are filled from values.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pixelquest
  labels:
    app: pixelquest
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pixelquest
  template:
    metadata:
      labels:
        app: pixelquest
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
