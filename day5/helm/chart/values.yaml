# Default values for the pixelquest chart.
# Override any of these at install time with --set or a custom values file.

replicaCount: 2

image:
  repository: pixelquest-api
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
