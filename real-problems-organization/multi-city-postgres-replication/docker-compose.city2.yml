# =============================================================================
# CITY 2 — LAHORE  (Node #2)
#   pg-city2         : primary  (app writes here)        host port 5434
#   pg-city2-backup  : local HA standby (streaming)      host port 5444
# Joins the shared external network "citynet" so it can sync with City1/City3.
# =============================================================================
name: city2-lahore

networks:
  citynet:
    external: true

volumes:
  city2_data:
  city2_backup_data:

services:
  pg-city2:
    image: postgres:16
    container_name: pg-city2
    hostname: pg-city2
    restart: unless-stopped
    networks: [citynet]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: citydb
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - max_worker_processes=16
      - -c
      - max_logical_replication_workers=8
      - -c
      - cluster.node_name=lahore
    volumes:
      - ./init/primary:/docker-entrypoint-initdb.d:ro
      - city2_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d citydb"]
      interval: 5s
      timeout: 5s
      retries: 12

  pg-city2-backup:
    image: postgres:16
    container_name: pg-city2-backup
    hostname: pg-city2-backup
    restart: unless-stopped
    networks: [citynet]
    user: root
    depends_on:
      pg-city2:
        condition: service_healthy
    environment:
      PRIMARY_HOST: pg-city2
      REPL_USER: replicator
      REPL_PASSWORD: replpass
    entrypoint: ["/bin/bash", "/scripts/standby-entrypoint.sh"]
    volumes:
      - ./scripts/standby-entrypoint.sh:/scripts/standby-entrypoint.sh:ro
      - city2_backup_data:/var/lib/postgresql/data
    ports:
      - "5444:5432"
